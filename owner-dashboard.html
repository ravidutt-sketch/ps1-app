<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — PS1</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>/* ═══════════════════════════════════════════════════════════════════════════
   PS1 2.0 — Shared Theme (embedded in each HTML page for portability)
   Navy + Gold professional, refined, real-estate financial control aesthetic
   ═══════════════════════════════════════════════════════════════════════════ */

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:     #1A2845;
  --navy-2:   #2A3B5F;
  --navy-3:   #3D4F7A;
  --gold:     #C9A857;
  --gold-2:   #B8973F;
  --bg:       #F5F6FA;
  --surface:  #FFFFFF;
  --line:     #E2E8F0;
  --text:     #1A2845;
  --text-2:   #64748B;
  --text-3:   #94A3B8;

  --critical: #B71C1C;
  --high:     #E65100;
  --medium:   #F57C00;
  --low:      #2E7D32;
  --freeze:   #880E4F;

  --success-bg: #E8F5E9;
  --success-fg: #2E7D32;
  --error-bg:   #FFEBEE;
  --error-fg:   #C62828;
  --warn-bg:    #FFF8E1;
  --warn-fg:    #F57C00;

  --radius:     6px;
  --radius-lg:  10px;
  --shadow:     0 1px 3px rgba(26, 40, 69, 0.08);
  --shadow-md:  0 4px 12px rgba(26, 40, 69, 0.12);
  --shadow-lg:  0 12px 32px rgba(26, 40, 69, 0.18);

  --display: 'Playfair Display', Georgia, 'Times New Roman', serif;
  --body:    'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono:    'JetBrains Mono', 'Courier New', monospace;
}

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.app-shell {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

.topbar {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
  color: #fff;
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid var(--gold);
  box-shadow: var(--shadow-md);
  position: sticky; top: 0; z-index: 100;
}
.topbar .brand {
  display: flex; align-items: center; gap: 12px;
}
.topbar .brand-logo {
  width: 32px; height: 32px;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display); font-weight: 700; font-size: 18px;
  color: var(--navy); border-radius: 4px;
}
.topbar .brand-name {
  font-family: var(--display); font-size: 18px; font-weight: 700; letter-spacing: 1px;
}
.topbar .brand-tag {
  font-size: 9px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-top: -2px;
}

.topbar .nav-tabs {
  display: flex; gap: 4px;
}
.topbar .nav-tab {
  padding: 8px 14px;
  background: transparent;
  color: rgba(255,255,255,0.7);
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--body); font-size: 11px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  transition: all 0.2s;
  text-decoration: none;
}
.topbar .nav-tab:hover {
  color: var(--gold); background: rgba(201, 168, 87, 0.1);
}
.topbar .nav-tab.active {
  background: var(--gold); color: var(--navy);
}

.topbar .user-info {
  display: flex; align-items: center; gap: 10px;
  padding-left: 16px; border-left: 1px solid rgba(255,255,255,0.15);
}
.topbar .user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(201, 168, 87, 0.2);
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; color: var(--gold);
}
.topbar .user-info .name { font-size: 12px; font-weight: 600; }
.topbar .user-info .role { font-size: 9px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
.logout-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7); padding: 6px 12px; border-radius: 4px;
  cursor: pointer; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
}
.logout-btn:hover { background: var(--critical); border-color: var(--critical); color: #fff; }

/* ── Main content ── */
.main {
  padding: 28px 32px;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.page-title {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.page-subtitle {
  color: var(--text-2);
  font-size: 13px;
  margin-bottom: 24px;
}

/* ── Cards ── */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  border: 1px solid var(--line);
  overflow: hidden;
  margin-bottom: 20px;
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  background: #FAFBFC;
  display: flex; align-items: center; justify-content: space-between;
}
.card-header h3 {
  font-family: var(--display); font-size: 16px; font-weight: 700; color: var(--navy);
  letter-spacing: 0.3px;
}
.card-header .badge {
  background: var(--gold); color: var(--navy);
  padding: 3px 10px; border-radius: 12px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
}
.card-body { padding: 20px; }

/* ── Forms ── */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.form-group { display: flex; flex-direction: column; }
.form-group label {
  font-size: 10px; color: var(--text-2);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 6px; font-weight: 600;
}
.form-group label .required { color: var(--critical); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  font-family: var(--body); font-size: 13px;
  color: var(--text); background: #FAFBFC;
  transition: all 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--gold);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(201, 168, 87, 0.12);
}
.form-group input:disabled, .form-group select:disabled {
  background: var(--bg); color: var(--text-3); cursor: not-allowed;
}
.form-group .hint { font-size: 10px; color: var(--text-3); margin-top: 4px; }
.conditional { display: none; }
.conditional.show { display: flex; }

.form-actions {
  display: flex; gap: 10px; justify-content: flex-end;
  margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line);
}

/* ── Buttons ── */
.btn {
  padding: 10px 18px;
  border: none; border-radius: var(--radius);
  font-family: var(--body); font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary {
  background: var(--navy); color: var(--gold);
}
.btn-primary:hover:not(:disabled) {
  background: var(--navy-2); transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.btn-primary:disabled { opacity: 0.5; cursor: wait; }
.btn-secondary {
  background: transparent; color: var(--navy); border: 1px solid var(--line);
}
.btn-secondary:hover { border-color: var(--navy); background: var(--bg); }
.btn-danger {
  background: var(--critical); color: #fff;
}
.btn-danger:hover { background: #8B0000; }
.btn-success {
  background: var(--low); color: #fff;
}
.btn-success:hover { background: #1B5E20; }
.btn-sm { padding: 6px 12px; font-size: 10px; }
.btn-icon { padding: 8px; }

/* ── Tabs ── */
.tabs {
  display: flex; gap: 4px; border-bottom: 2px solid var(--line); margin-bottom: 20px;
}
.tab {
  padding: 12px 20px;
  background: transparent;
  border: none; border-bottom: 2px solid transparent;
  cursor: pointer; font-family: var(--body); font-size: 12px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-2); margin-bottom: -2px;
}
.tab:hover { color: var(--navy); }
.tab.active { color: var(--navy); border-bottom-color: var(--gold); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse;
}
table thead {
  background: var(--navy); color: var(--gold);
}
table th {
  padding: 10px 12px; text-align: left; font-size: 10px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
}
table td {
  padding: 10px 12px; border-bottom: 1px solid var(--line); font-size: 12px;
}
table tbody tr:hover { background: var(--bg); }
table tbody tr.action-row { cursor: pointer; }
table tbody tr.action-row:hover { background: rgba(201, 168, 87, 0.08); }

/* ── Status pills ── */
.pill {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.pill-critical { background: var(--critical); color: #fff; }
.pill-high     { background: var(--high); color: #fff; }
.pill-medium   { background: var(--warn-bg); color: var(--warn-fg); }
.pill-low      { background: var(--success-bg); color: var(--success-fg); }
.pill-success  { background: var(--success-bg); color: var(--success-fg); }
.pill-pending  { background: var(--warn-bg); color: var(--warn-fg); }
.pill-rejected { background: var(--error-bg); color: var(--error-fg); }
.pill-freeze   { background: var(--freeze); color: #fff; }
.pill-default  { background: var(--bg); color: var(--text-2); border: 1px solid var(--line); }

/* ── Stat cards ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.stat-card {
  background: var(--surface); padding: 18px;
  border-radius: var(--radius-lg); border-top: 3px solid var(--navy);
  box-shadow: var(--shadow);
}
.stat-card .stat-label {
  font-size: 10px; color: var(--text-2);
  text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
}
.stat-card .stat-value {
  font-family: var(--display); font-size: 30px; font-weight: 700;
  color: var(--navy); line-height: 1.1; margin-top: 4px;
}
.stat-card .stat-meta {
  font-size: 10px; color: var(--text-3); margin-top: 6px;
}
.stat-card.alert  { border-top-color: var(--critical); }
.stat-card.alert .stat-value { color: var(--critical); }
.stat-card.warn   { border-top-color: var(--high); }
.stat-card.warn .stat-value { color: var(--high); }
.stat-card.success{ border-top-color: var(--low); }
.stat-card.success .stat-value { color: var(--low); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  padding: 14px 18px; border-radius: var(--radius);
  font-size: 12px; font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 1000;
  animation: slideIn 0.3s ease-out;
  max-width: 360px;
}
.toast.success { background: var(--low); color: #fff; }
.toast.error   { background: var(--critical); color: #fff; }
.toast.info    { background: var(--navy); color: var(--gold); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── Loading ── */
.loading {
  text-align: center; padding: 40px; color: var(--text-2);
}
.spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 2px solid var(--line); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-3);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state h4 { font-family: var(--display); font-size: 18px; color: var(--text-2); margin-bottom: 6px; }

/* ── Login page specific ── */
.login-shell {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 50%, var(--navy-3) 100%);
  position: relative; overflow: hidden;
}
.login-shell::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(201, 168, 87, 0.08) 0%, transparent 30%),
    radial-gradient(circle at 80% 80%, rgba(201, 168, 87, 0.05) 0%, transparent 40%);
}
.login-card {
  background: var(--surface); padding: 40px;
  border-radius: var(--radius-lg);
  box-shadow: 0 24px 48px rgba(0,0,0,0.3);
  width: 100%; max-width: 400px;
  position: relative; z-index: 1;
  border-top: 4px solid var(--gold);
}
.login-card h1 {
  font-family: var(--display); font-size: 32px; font-weight: 700;
  color: var(--navy); margin-bottom: 4px; letter-spacing: -0.5px;
}
.login-card .tagline {
  font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 32px; font-weight: 600;
}

/* ── Approval card (mobile-friendly swipe) ── */
.approval-stack { display: flex; flex-direction: column; gap: 12px; }
.approval-card {
  background: var(--surface); border-radius: var(--radius-lg);
  border-left: 4px solid var(--gold); padding: 18px;
  box-shadow: var(--shadow);
}
.approval-card.farmer-payment { border-left-color: var(--low); }
.approval-card.refund-payment { border-left-color: var(--high); }
.approval-card.cancel { border-left-color: var(--critical); }
.approval-card .meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.approval-card .req-id {
  font-family: var(--mono); font-size: 11px; color: var(--text-2);
}
.approval-card .req-amount {
  font-family: var(--display); font-size: 24px; font-weight: 700; color: var(--navy);
}
.approval-card .req-detail {
  font-size: 12px; color: var(--text); margin-bottom: 4px;
}
.approval-card .req-reason {
  font-size: 11px; color: var(--text-2); font-style: italic;
}
.approval-card .req-actions { display: flex; gap: 8px; margin-top: 14px; }

/* ── Mobile responsive ── */
@media (max-width: 768px) {
  .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 12px; }
  .topbar .nav-tabs { order: 3; width: 100%; overflow-x: auto; flex-wrap: nowrap; }
  .topbar .brand-name { font-size: 16px; }
  .main { padding: 20px 16px; }
  .page-title { font-size: 22px; }
  .form-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head><body>
<div class="app-shell"><div id="topbar-mount"></div><main class="main">
<h1 class="page-title">Dashboard</h1>
<p class="page-subtitle">Real-time financial position and risk overview.</p>

<div class="stats-grid">
  <div class="stat-card success"><div class="stat-label">Today's Inflow</div><div class="stat-value" id="kpi-inflow">—</div><div class="stat-meta">Customer payments received</div></div>
  <div class="stat-card warn"><div class="stat-label">Pending Approvals</div><div class="stat-value" id="kpi-pending">—</div><div class="stat-meta">Awaiting your decision</div></div>
  <div class="stat-card alert"><div class="stat-label">Critical Risk</div><div class="stat-value" id="kpi-critical">—</div><div class="stat-meta">Customers requiring action</div></div>
  <div class="stat-card"><div class="stat-label">Net Position</div><div class="stat-value" id="kpi-net">—</div><div class="stat-meta">Conservative cash</div></div>
</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(380px, 1fr));gap:16px;">
  <div class="card">
    <div class="card-header"><h3>📈 This Month</h3></div>
    <div class="card-body" id="month-content"><div class="loading"><div class="spinner"></div></div></div>
  </div>
  <div class="card">
    <div class="card-header"><h3>⚠ Risk Overview</h3></div>
    <div class="card-body" id="risk-content"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<div class="card">
  <div class="card-header"><h3>📋 Recent Activity</h3></div>
  <div class="card-body" id="activity-content"><div class="loading"><div class="spinner"></div></div></div>
</div>
</main></div>
<script>

/* ═══════════════════════════════════════════════════════════════════════════
   PS1 2.0 — Shared Client JS (embedded in each page)
   ═══════════════════════════════════════════════════════════════════════════ */

const PS1 = {
  // CONFIG: Set this to your deployed Apps Script Web App URL
  API_URL: 'https://script.google.com/macros/s/AKfycbzVGoY_pl1G31htl9hPPm95XU8Dn4zf8loBf7N3IrWmfg5wpCMp_KaQsZbRQJFmjXQx4Q/exec',

  token: null,
  user: null,

  init() {
    const stored = sessionStorage.getItem('ps1_session');
    if (stored) {
      try {
        const session = JSON.parse(stored);
        if (new Date(session.expiresAt) > new Date()) {
          this.token = session.token;
          this.user = session.user;
        } else {
          sessionStorage.removeItem('ps1_session');
        }
      } catch (e) { sessionStorage.removeItem('ps1_session'); }
    }
  },

  saveSession(token, user, expiresAt) {
    this.token = token;
    this.user = user;
    sessionStorage.setItem('ps1_session', JSON.stringify({ token, user, expiresAt }));
  },

  logout() {
    sessionStorage.removeItem('ps1_session');
    this.token = null;
    this.user = null;
    window.location.href = 'login.html';
  },

  requireAuth(allowedRoles) {
    if (!this.token) {
      window.location.href = 'login.html';
      return false;
    }
    if (allowedRoles && allowedRoles.indexOf(this.user.role) === -1 && this.user.role !== 'SUPER_ADMIN') {
      this.toast('Access denied — insufficient role', 'error');
      setTimeout(() => window.location.href = 'login.html', 1500);
      return false;
    }
    return true;
  },

  async call(action, payload) {
    try {
      const res = await fetch(this.API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, token: this.token, payload: payload || {} })
      });
      const data = await res.json();
      if (!data.ok && data.error && data.error.indexOf('Unauthorized') >= 0) {
        this.toast('Session expired — logging out', 'error');
        setTimeout(() => this.logout(), 1500);
      }
      return data;
    } catch (err) {
      return { ok: false, error: 'Network error: ' + err.message };
    }
  },

  toast(msg, type) {
    const t = document.createElement('div');
    t.className = 'toast ' + (type || 'info');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => {
      t.style.opacity = '0';
      setTimeout(() => t.remove(), 300);
    }, type === 'error' ? 5000 : 3500);
  },

  formatINR(n) {
    if (typeof n !== 'number' || isNaN(n)) return '₹0';
    const s = Math.round(n).toString();
    let lt = s.slice(-3); const o = s.slice(0, -3);
    if (o !== '') lt = ',' + lt;
    return '₹' + o.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + lt;
  },

  formatDate(d) {
    if (!d) return '';
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return d;
    return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  },

  el(id) { return document.getElementById(id); },

  renderTopbar(activeTab) {
    if (!this.user) return '';
    const tabs = this.getTabsForRole(this.user.role);
    const initials = (this.user.displayName || this.user.email).substring(0,2).toUpperCase();

    return `
      <div class="topbar">
        <div class="brand">
          <div class="brand-logo">P</div>
          <div>
            <div class="brand-name">PS1</div>
            <div class="brand-tag">Property Sales Intelligence</div>
          </div>
        </div>
        <nav class="nav-tabs">
          ${tabs.map(t => `<a href="${t.href}" class="nav-tab ${activeTab === t.id ? 'active' : ''}">${t.label}</a>`).join('')}
        </nav>
        <div class="user-info">
          <div class="user-avatar">${initials}</div>
          <div>
            <div class="name">${this.user.displayName || this.user.email}</div>
            <div class="role">${this.user.role}</div>
          </div>
          <button class="logout-btn" onclick="PS1.logout()">Logout</button>
        </div>
      </div>
    `;
  },

  getTabsForRole(role) {
    const all = {
      ADMIN: [
        { id: 'admin-input', href: 'admin-input.html', label: 'Input' },
        { id: 'admin-followup', href: 'admin-followup.html', label: 'Follow-ups' },
        { id: 'inventory', href: 'inventory.html', label: 'Inventory' }
      ],
      FINANCE: [
        { id: 'finance-input', href: 'finance-input.html', label: 'Input' },
        { id: 'finance-followup', href: 'finance-followup.html', label: 'Follow-ups' }
      ],
      OWNER: [
        { id: 'owner-dashboard', href: 'owner-dashboard.html', label: 'Dashboard' },
        { id: 'owner-approval', href: 'owner-approval.html', label: 'Approvals' },
        { id: 'client-view', href: 'client-view.html', label: 'Reports' }
      ],
      SUPER_ADMIN: [
        { id: 'admin-input', href: 'admin-input.html', label: 'Admin Input' },
        { id: 'finance-input', href: 'finance-input.html', label: 'Finance Input' },
        { id: 'owner-approval', href: 'owner-approval.html', label: 'Approvals' },
        { id: 'owner-dashboard', href: 'owner-dashboard.html', label: 'Dashboard' },
        { id: 'inventory', href: 'inventory.html', label: 'Inventory' }
      ]
    };
    return all[role] || [];
  }
};

</script><script>PS1.init();
if (!PS1.requireAuth(['OWNER','SUPER_ADMIN'])) {} else {
  PS1.el('topbar-mount').innerHTML = PS1.renderTopbar('owner-dashboard');
  loadDashboard();
  setInterval(loadDashboard, 60000);  // refresh every minute
}

async function loadDashboard() {
  const [pending, masters] = await Promise.all([
    PS1.call('get_pending_approvals'),
    PS1.call('get_masters')
  ]);

  if (pending.ok) {
    PS1.el('kpi-pending').textContent = pending.total || 0;
  }

  // Pull dashboard data from sheet
  const dash = await PS1.call('get_dashboard', { role: 'OWNER' });
  if (dash.ok && dash.data && dash.data.ceoDashboard) {
    renderCEO(dash.data.ceoDashboard);
  }

  // Quick stat: Today's inflow (this would come from a dedicated endpoint in production)
  PS1.el('kpi-inflow').textContent = '—';
  PS1.el('kpi-critical').textContent = '—';
  PS1.el('kpi-net').textContent = '—';
}

function renderCEO(data) {
  // Parse the array returned from sheet
  const monthly = []; const risk = []; const activity = [];

  // Find sections heuristically by row content
  data.forEach(row => {
    const label = (row[0] || '').toString();
    const value = row[1];
    if (label.includes('Inflow') || label.includes('Collected') || label.includes('Net Position') || label.includes('THIS MONTH')) {
      monthly.push({ label, value });
    } else if (label.includes('CRITICAL') || label.includes('HIGH') || label.includes('Bounced') || label.includes('Frozen') || label.includes('Pending')) {
      risk.push({ label, value });
    }
  });

  PS1.el('month-content').innerHTML = monthly.length === 0 ?
    '<p style="color:var(--text-3);font-size:12px;">Run Phase D setup to populate.</p>' :
    monthly.map(m => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);"><span style="font-size:12px;">${m.label}</span><span style="font-weight:600;">${typeof m.value === 'number' ? PS1.formatINR(m.value) : (m.value || '—')}</span></div>`).join('');

  PS1.el('risk-content').innerHTML = risk.length === 0 ?
    '<p style="color:var(--text-3);font-size:12px;">No risk data.</p>' :
    risk.map(r => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);"><span style="font-size:12px;">${r.label}</span><span style="font-weight:600;color:var(--high);">${r.value || 0}</span></div>`).join('');

  PS1.el('activity-content').innerHTML = '<p style="color:var(--text-3);font-size:12px;">Activity feed loading via sidebar API.</p>';
}
</script>
</body></html>
